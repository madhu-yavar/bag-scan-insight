services:
  app:
    build:
      context: .
      args:
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
    image: godigit-bagscan:latest
    container_name: godigit-bagscan
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY in .env}
      SUPABASE_PROJECT_ID: ${SUPABASE_PROJECT_ID:?set SUPABASE_PROJECT_ID in .env}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:?set SUPABASE_PUBLISHABLE_KEY in .env}
      SUPABASE_URL: ${SUPABASE_URL:?set SUPABASE_URL in .env}
      VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID:?set VITE_SUPABASE_PROJECT_ID in .env}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:?set VITE_SUPABASE_PUBLISHABLE_KEY in .env}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:?set VITE_SUPABASE_URL in .env}
    ports:
      - "8888:3000"
    volumes:
      - godigit-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  godigit-data:
